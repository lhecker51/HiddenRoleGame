<body>
    <section class="screen">
            <h1>Hidden Role Game</h1>

            <input type="text" placeholder="Session code">

    <h2>das ist ein test!!!</h2>

    <p id="response-text">Test</p>

    <script>
        const ws = new WebSocket('wss://your-node-server.railway.app');

        ws.onopen = () => {
            ws.send(JSON.stringify({ type: 'join' }));
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'role') {
                console.log('Your role is:', data.role);
            }
            if (data.type === 'action') {
                console.log('Player action received:', data.payload);
            }
        };

        function sendAction(payload) {
            ws.send(JSON.stringify({ type: 'action', payload }));
        }
    </script>
</body>
